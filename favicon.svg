<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f111a" />
      <stop offset="100%" stop-color="#1a1c2d" />
    </linearGradient>
    
    <!-- Brand Primary Gradient -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>

    <!-- Subtle Globe Glow -->
    <radialGradient id="globeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#0f111a" stop-opacity="0" />
    </radialGradient>
  </defs>
  
  <!-- Outer Glowing Rim -->
  <rect x="0" y="0" width="100" height="100" rx="24" fill="url(#primaryGradient)" />
  <!-- Inner Dark Background -->
  <rect x="3" y="3" width="94" height="94" rx="22" fill="url(#bgGradient)" />
  
  <!-- Globe Glow -->
  <circle cx="50" cy="50" r="40" fill="url(#globeGlow)" />
  
  <!-- Globe / World representation (Subtle behind note) -->
  <g opacity="0.25" stroke="#ffffff" stroke-width="1.5" fill="none">
    <circle cx="50" cy="50" r="32" />
    <ellipse cx="50" cy="50" rx="14" ry="32" />
    <line x1="18" y1="50" x2="82" y2="50" />
    <path d="M 27 30 Q 50 38 73 30" />
    <path d="M 27 70 Q 50 62 73 70" />
  </g>
  
  <!-- Dynamic Music Note -->
  <g fill="url(#primaryGradient)">
    <!-- Left Note Base -->
    <ellipse cx="36" cy="68" rx="11" ry="9" transform="rotate(-15 36 68)"/>
    <!-- Right Note Base -->
    <ellipse cx="68" cy="60" rx="11" ry="9" transform="rotate(-15 68 60)"/>
    
    <!-- Left Stem -->
    <rect x="42" y="34" width="6" height="34" rx="1" />
    <!-- Right Stem -->
    <rect x="74" y="26" width="6" height="34" rx="1" />
    
    <!-- Top Beam -->
    <path d="M 42 34 L 42 20 Q 42 18 44 17.5 L 78 9 Q 80 8.5 80 10.5 L 80 26 L 42 34 Z" />
  </g>
  
  <!-- Play Button Cutout on Left Note (Optional highlight) -->
  <polygon points="34,64 34,72 41,68" fill="#ffffff" opacity="0.9" />
</svg>